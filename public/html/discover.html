<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Discover</title>

  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/navbar.css">
  <link rel="stylesheet" href="/styles/style.css">
  <link rel="stylesheet" href="/styles/player.css">
  <link rel="stylesheet" href="/styles/discover.css">
</head>

<body>

<!-- 🎥 ФОН -->
<div class="video-background">
  <video autoplay muted loop playsinline id="background-video">
    <source src="/images/bg.mp4" type="video/mp4">
  </video>
</div>

<div class="swipe-bg"></div>

<div id="navbar"></div>
<div id="player"></div>

<!-- 🎴 СВАЙП -->
<div class="swipe-container">
  <div class="card-stack">

    <div class="track-card next"></div>

    <div class="track-card active">
      <div class="card-content">
        <div class="cover"></div>

        <div class="track-info">
          <h2>Track 1</h2>
          <p class="artist">Unknown artist</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- 🎧 ПЛЕЕР -->
<div class="player">

  <div class="progress">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="player-controls">
    <button class="back">↩</button>
    <button class="dislike">✖</button>
    <button class="play">▶</button>
    <button class="like">❤</button>

    <div class="volume">
      <div class="volume-icon" id="volumeIcon">
        <svg id="volumeOn" viewBox="0 0 24 24" fill="none">
          <path d="M16 9c.6.8 1 1.8 1 3s-.4 2.2-1 3M18 5.3C19.8 7 21 9.3 21 12s-1.2 5-3 6.7M4.6 9H5.5c.5 0 .8 0 1-.07.2-.06.4-.16.6-.3.2-.15.4-.36.7-.78l2.6-3.1c.4-.5.6-.7.8-.7.1 0 .3 0 .4.1.2.1.2.4.2 1.1v13.6c0 .7 0 1-.2 1.1-.1.1-.3.1-.4.1-.2 0-.4-.2-.8-.7l-2.6-3.1c-.3-.4-.5-.6-.7-.8-.2-.1-.4-.2-.6-.3-.2-.07-.5-.07-1-.07H4.6c-.6 0-.8 0-1-.1a1 1 0 0 1-.4-.4c-.1-.2-.1-.4-.1-1v-2.8c0-.6 0-.8.1-1 .1-.2.2-.3.4-.4.2-.1.4-.1 1-.1Z" stroke="white" stroke-width="1.5"/>
        </svg>

        <svg id="volumeOff" style="display:none" viewBox="0 0 24 24">
          <path d="M4 11c0-1.1.9-2 2-2h1.3c.4 0 .8-.1 1.2-.4L10.4 7.2c.7-.5 1.6 0 1.6.8v8c0 .8-.9 1.3-1.6.8l-1.9-1.4c-.4-.3-.8-.4-1.2-.4H6c-1.1 0-2-.9-2-2v-2Z" stroke="white" stroke-width="1.5"/>
          <line x1="19" y1="10" x2="15" y2="14" stroke="white" stroke-width="1.5"/>
          <line x1="15" y1="10" x2="19" y2="14" stroke="white" stroke-width="1.5"/>
        </svg>
      </div>

      <input type="range" id="volumeRange" min="0" max="100" value="70">
    </div>
  </div>

</div>

<audio id="audioPlayer"></audio>

<script src="/js/swipe.js"></script>
<script src="/js/player.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<title>Music Platform</title>

<link rel="stylesheet" href="../styles/style.css">
<link rel="stylesheet" href="/styles/navbar.css">

</head>


<body>

<!-- NAVBAR ПОДГРУЖАЕТСЯ СЮДА -->
<div id="navbar"></div>


<div class="main-layout">

<!-- ЛЕВАЯ КОЛОНКА -->

<aside class="left-panel">

<h2>🔥 Топ треки</h2>

<div class="track-card">
<img src="https://picsum.photos/300/200">
<p>Artist — Track</p>
<span>⭐ 92</span>
</div>

<div class="track-card">
<img src="https://picsum.photos/300/201">
<p>Artist — Track</p>
<span>⭐ 88</span>
</div>

<div class="track-card">
<img src="https://picsum.photos/300/202">
<p>Artist — Track</p>
<span>⭐ 85</span>
</div>

</aside>


<!-- ЦЕНТР -->

<main class="feed">

<h2 class="feed-title">Рекомендованные посты</h2>

<div class="post">

<div class="post-header">
<img src="https://picsum.photos/40">
<b>Producer123</b>
</div>

<p>Сегодня дропаю новый трек 🔥</p>

</div>


<div class="post">

<div class="post-header">
<img src="https://picsum.photos/41">
<b>DJ Alex</b>
</div>

<p>Кто сегодня кидает треки на стрим?</p>

</div>


<div class="post">

<div class="post-header">
<img src="https://picsum.photos/42">
<b>BeatMaker</b>
</div>

<p>Работаю над новым альбомом 🎶</p>

</div>

</main>


<!-- ПРАВАЯ КОЛОНКА -->

<aside class="right-panel">

<h2>🏆 Топ исполнители</h2>

<div class="artist">
<img src="https://picsum.photos/100">
<p>ProducerX</p>
</div>

<div class="artist">
<img src="https://picsum.photos/101">
<p>DJ Alex</p>
</div>

<div class="artist">
<img src="https://picsum.photos/102">
<p>BeatMaker</p>
</div>

</aside>

</div>


<!-- ПОДГРУЗКА NAVBAR -->

<script>

fetch("/html/components/navbar.html")
.then(res => res.text())
.then(data => {

document.getElementById("navbar").innerHTML = data

const script = document.createElement("script")
script.src = "/js/navbar.js"
document.body.appendChild(script)

})

</script>

<script>

async function loadFeed(){

const res = await fetch("/feed")
const posts = await res.json()

const container = document.querySelector(".feed")

container.innerHTML = '<h2 class="feed-title">Рекомендованные посты</h2>'

posts.forEach(post=>{

let media=""

if(post.media_type==="image"){
media=`<img src="${post.media_url}" class="post-media">`
}

if(post.media_type==="video"){
media=`<video controls class="post-media"><source src="${post.media_url}"></video>`
}

container.innerHTML += `
<div class="post">

<div class="post-header">
<img src="${post.avatar}">
<b>${post.username}</b>
</div>

<p>${post.content}</p>

${media}

</div>
`

})

}

loadFeed()

</script>

</body>
</html>

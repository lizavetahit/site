<div class="auth-page">

  <div class="auth-card">
    <h1 class="auth-card-title">Вход</h1>
    <p class="auth-card-subtitle">Войди в свой аккаунт на музыкальной платформе</p>

    <form id="loginForm" class="auth-form">

      <label class="auth-label">Email или @username</label>
      <input
        id="email"
        class="auth-input"
        type="text"
        placeholder="email или @username"
      >

      <label class="auth-label">Пароль</label>
      <input
        type="password"
        id="password"
        class="auth-input"
        placeholder="Введите пароль"
      >

      <div id="error" class="auth-error"></div>

      <button type="submit" class="auth-submit-btn">Войти</button>

      <p class="auth-switch">
        Нет аккаунта? <a href="/register">Зарегистрироваться</a>
      </p>

      <div class="auth-telegram">
        <p class="auth-telegram-text">Или войди через Telegram</p>

        <div class="telegram-widget-wrap">
        </div>

        <img id="tgAvatar" class="auth-telegram-avatar auth-hidden" />
      </div>

    </form>
  </div>

</div>

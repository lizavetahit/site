<div class="privacy-page">

  <h1 class="privacy-page-title">Конфиденциальность аккаунта</h1>

  <div class="privacy-card">
    <div class="privacy-block">

      <div class="privacy-panel">
        <h3>Смена пароля</h3>

        <input
          type="password"
          id="currentPassword"
          class="privacy-input"
          placeholder="Текущий пароль"
        >

        <input
          type="password"
          id="newPassword"
          class="privacy-input"
          placeholder="Новый пароль"
        >

        <button onclick="changePassword()" class="privacy-main-btn">
          Сменить пароль
        </button>
      </div>

      <div class="privacy-divider"></div>

      <div class="privacy-panel">
        <h3>Смена почты</h3>

        <input
          type="email"
          id="newEmail"
          class="privacy-input"
          placeholder="Новая почта"
        >

        <button onclick="changeEmail()" class="privacy-main-btn">
          Сменить почту
        </button>
      </div>

      <div class="privacy-divider"></div>

      <div class="privacy-panel privacy-panel-danger">
        <h3>Удаление аккаунта</h3>
        <p class="privacy-danger-text">Это действие нельзя отменить.</p>

        <button onclick="deleteAccount()" class="privacy-danger-btn">
          Удалить аккаунт
        </button>
      </div>

    </div>
  </div>

</div>

<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Конфиденциальность</title>

<link rel="stylesheet" href="/styles/style.css">
<link rel="stylesheet" href="/styles/privacy.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div id="navbar"></div>

<div class="privacy-container">

<h1>Конфиденциальность аккаунта</h1>

<div class="privacy-section">

<h3>Смена пароля</h3>

<input type="password" id="currentPassword" placeholder="Текущий пароль">

<input type="password" id="newPassword" placeholder="Новый пароль">

<button onclick="changePassword()" class="main-btn">
Сменить пароль
</button>

</div>


<div class="privacy-section">

<h3>Смена почты</h3>

<input type="email" id="newEmail" placeholder="Новая почта">

<button onclick="changeEmail()" class="main-btn">
Сменить почту
</button>

</div>


<div class="privacy-section danger">

<h3>Удаление аккаунта</h3>

<p>Это действие нельзя отменить.</p>

<button onclick="deleteAccount()" class="danger-btn">
Удалить аккаунт
</button>

</div>

</div>

<script src="/js/navbar.js"></script>
<script src="/js/privacy.js"></script>

</body>
</html>

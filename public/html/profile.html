<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль</title>

  <link rel="stylesheet" href="/styles/style.css" />
  <link rel="stylesheet" href="/styles/profile.css" />
  <link rel="stylesheet" href="/styles/navbar.css">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>
<body>
  <div id="navbar"></div>
  <script>

fetch("/html/components/navbar.html")
.then(res => res.text())
.then(data => {

document.getElementById("navbar").innerHTML = data

const script = document.createElement("script")
script.src = "/js/navbar.js"
document.body.appendChild(script)

})


</script>

  <div class="profile-container">
    <div class="profile-card">
      <div id="socialLinks" class="social-links top-right"></div>

      <div class="profile-header">
        <div class="avatar-wrapper">
          <img
            id="avatar"
            class="avatar"
            src="https://i.pravatar.cc/150"
            alt="Аватар профиля"
          />

          <label for="avatarInput" class="avatar-upload" title="Изменить аватар">
            <i class="fa-solid fa-camera"></i>
          </label>
          <input id="avatarInput" type="file" accept="image/*" hidden />
        </div>

        <div class="profile-info">
          <div class="username-row">
            <h2 id="username"></h2>

            <button class="icon-btn edit-username-btn" onclick="editUsername()" title="Изменить ник">
              <i class="fa-solid fa-pen"></i>
            </button>
          </div>

          <div id="usernameEditBox" class="username-edit hidden">
            <input id="usernameInput" type="text" placeholder="Введите новый ник" />
            <button class="save-inline-btn" onclick="saveUsername()" title="Сохранить">
              <i class="fa-solid fa-check"></i>
            </button>
            <button class="cancel-inline-btn" onclick="cancelUsernameEdit()" title="Отмена">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>

          <p id="usernameError" class="field-error"></p>

          
          <p id="bio" class="bio"></p>

          <div class="profile-actions">

<button class="main-btn" onclick="openEdit()">Редактировать профиль</button>

<button class="secondary-btn" onclick="openSettings()">
<i class="fa-solid fa-gear"></i> Настройки
</button>

</div>

          <p id="profileError" class="field-error"></p>
          <p id="profileSuccess" class="field-success"></p>
        </div>
      </div>
    </div>


    <div class="profile-content">

<div class="profile-tabs">

<button class="tab-btn" onclick="switchTab('posts')">
<i class="fa-solid fa-table-cells"></i> Посты
</button>

<button class="tab-btn" onclick="switchTab('tracks')">
<i class="fa-solid fa-music"></i> Треки
</button>

<button class="tab-btn" onclick="switchTab('mentions')">
<i class="fa-solid fa-at"></i> Упоминания
</button>



</div>

<div id="postsTab" class="tab-content active">

<div class="section-header">
<h3>Посты</h3>
<button class="secondary-btn" onclick="openPostModal()">＋ Пост</button>
</div>

<div id="postsContainer"></div>

</div>

<div id="tracksTab" class="tab-content">

<div class="section-header">
<h3>Треки</h3>
<button class="secondary-btn" onclick="addTrack()">＋ Трек</button>
</div>

<div id="tracksContainer"></div>

</div>

<div id="mentionsTab" class="tab-content">

<div class="section-header">
<h3>Упоминания</h3>
</div>

<div id="mentionsContainer"></div>

</div>

</div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <h3>Редактировать профиль</h3>

      <input id="editUsername" type="text" placeholder="Ник" />
      <textarea id="editBio" rows="4" maxlength="200" placeholder="Расскажите о себе"></textarea>

<div class="bio-counter">
<span id="bioCount">0</span>/200
</div>

      <input id="editAvatar" type="hidden" />

      <input id="editSoundcloud" type="text" placeholder="Ссылка на SoundCloud" />
      <input id="editInstagram" type="text" placeholder="Ссылка на Instagram" />
      <input id="editTwitter" type="hidden" />
      <input id="editTelegram" type="text" placeholder="Telegram username или ссылка" />
      <input id="editWebsite" type="text" placeholder="Ссылка на Website" />

      <div class="modal-buttons">
        <button class="main-btn" onclick="saveProfile()">Сохранить</button>
        <button class="secondary-btn" onclick="closeEdit()">Отмена</button>
      </div>
    </div>
  </div>

  <div id="cropModal" class="modal">
    <div class="modal-content crop-modal-content">
      <h3>Настройте аватар</h3>

      <div class="crop-stage">
        <div id="cropCircle" class="crop-circle">
          <img id="cropImage" alt="Предпросмотр аватара" draggable="false" />
        </div>
      </div>

      <label class="zoom-label" for="zoomRange">Масштаб</label>
      <input id="zoomRange" type="range" min="0.1" max="4" step="0.01" value="1" />

      <div class="modal-buttons">
        <button class="main-btn" onclick="applyCrop()">Сохранить аватар</button>
        <button class="secondary-btn" onclick="removeAvatar()">Удалить аватар</button>
        <button class="secondary-btn" onclick="closeCropModal()">Отмена</button>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="modal">

<div class="modal-content">

<h3>Настройки аккаунта</h3>

<input id="newEmail" type="email" placeholder="Новая почта">

<input id="currentPassword" type="password" placeholder="Текущий пароль">

<input id="newPassword" type="password" placeholder="Новый пароль">

<div class="modal-buttons">

<button class="main-btn" onclick="changeEmail()">Изменить почту</button>

<button class="main-btn" onclick="changePassword()">Изменить пароль</button>

<button class="secondary-btn" onclick="closeSettings()">Закрыть</button>

</div>

</div>

</div>

<div id="postModal" class="modal">

<div class="post-editor">

<div class="post-editor-header">

<h3>Создать публикацию</h3>

<button onclick="closePostModal()" class="icon-btn">
<i class="fa-solid fa-xmark"></i>
</button>

</div>


<textarea
id="postText"
maxlength="500"
placeholder="Что нового?"
></textarea>


<input
type="file"
id="postMedia"
accept="image/*,video/*"
hidden
>

<div class="editor-preview hidden" id="editorPreview">

<img id="editorImage">

<video id="editorVideo" controls class="hidden"></video>

</div>

<div class="editor-controls">

<button type="button" onclick="selectMedia()" class="secondary-btn">
<i class="fa-solid fa-image"></i> Добавить фото
</button>

<button type="button" onclick="removeMedia()" class="secondary-btn">
Удалить медиа
</button>

<input
type="range"
id="zoomSlider"
min="1"
max="3"
step="0.01"
class="hidden"
/>

</div>


<div class="modal-buttons">

<button onclick="publishPost()" class="main-btn">
Опубликовать
</button>

</div>

</div>

</div>

<script src="/js/profile/profile-user.js"></script>
<script src="/js/profile/profile-avatar.js"></script>
<script src="/js/profile/profile-posts.js"></script>
<script src="/js/profile/profile-editor.js"></script>
<script src="/js/profile/profile-tabs.js"></script>
<script src="/js/profile/profile-settings.js"></script>
<script src="/js/profile/profile-main.js"></script>

</body>
</html>

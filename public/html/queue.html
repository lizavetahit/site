<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Очередь треков</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/base.css">

<link rel="stylesheet" href="/styles/navbar.css">
<link rel="stylesheet" href="/styles/queue.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div id="navbar"></div>

<script>

fetch("/html/components/navbar.html")
.then(res => res.text())
.then(data => {

document.getElementById("navbar").innerHTML = data

const script = document.createElement("script")
script.src = "/js/navbar.js"
document.body.appendChild(script)

})

</script>


<div class="queue-page">

<h1 class="queue-title">Очередь треков</h1>

<div id="queueList" class="queue-list">

<div class="track-card">

<div class="track-left">

<img src="https://i.scdn.co/image/ab67616d0000b273947f6b95c89e4c1f7c43a44b" class="track-cover">

<div class="track-info">
<div class="track-artist">Drake</div>
<div class="track-title">Gods Plan</div>
</div>

</div>

<div class="track-actions">

<button class="judge-btn">
<i class="fa-solid fa-play"></i>
Оценить
</button>

<button class="delete-btn">
<i class="fa-solid fa-trash"></i>
</button>

</div>

</div>

<div class="track-card">

<div class="track-left">

<img src="https://i.scdn.co/image/ab67616d0000b2739b7e6cba6e8c7c3d6c02ab73" class="track-cover">

<div class="track-info">
<div class="track-artist">Travis Scott</div>
<div class="track-title">FE!N</div>
</div>

</div>

<div class="track-actions">

<button class="judge-btn">
<i class="fa-solid fa-play"></i>
Оценить
</button>

<button class="delete-btn">
<i class="fa-solid fa-trash"></i>
</button>

</div>

</div>

</div>

</div>


<script src="/js/queue.js"></script>

</body>
</html>

<div class="queue-page">
  <div class="queue-header">
    <h1 class="queue-title">Очередь треков</h1>
    <div id="queueStatusText" class="queue-status">загрузка...</div>
  </div>

  <div id="adminControls" class="queue-admin queue-hidden">
    <button id="openQueue" class="queue-admin-btn">Открыть</button>
    <button id="pauseQueue" class="queue-admin-btn">Пауза</button>
    <button id="resumeQueue" class="queue-admin-btn">Возобновить</button>
    <button id="closeQueue" class="queue-admin-btn queue-admin-btn-danger">Закрыть</button>
  </div>

  <div id="queueList" class="queue-list"></div>
</div>

<!DOCTYPE html>
<html lang="ru">

<script src="https://w.soundcloud.com/player/api.js"></script>
<head>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400&display=swap" rel="stylesheet"><link rel="stylesheet" href="/styles/base.css">
<link rel="stylesheet" href="/styles/navbar.css">   

<meta charset="UTF-8">
<title>Регистрация</title>
<link rel="stylesheet" href="/styles/base.css">
<link rel="stylesheet" href="/styles/style.css">
<link rel="stylesheet" href="/styles/register.css">

</head>


<body>

<div class="video-background">
  <video autoplay muted loop playsinline id="background-video">
    <source src="/images/bg.mp4" type="video/mp4">
  </video>
</div>

<div id="navbar"></div>

<div class="auth-container">

<div class="auth-card">

<h1>Создать аккаунт</h1>

<p class="subtitle">Присоединяйся к музыкальной платформе</p>

<form id="registerForm">

<label>Имя пользователя</label>
<input type="text" id="username" placeholder="username">

<label>Username (@)</label>
<input id="usernameTag" placeholder="например: kirill" />
<div id="tagStatus" class="tag-status"></div>

<label>Email</label>
<input type="email" id="email" placeholder="example@mail.com">
<div id="emailStatus" class="tag-status"></div>

<label>Пароль</label>
<input type="password" id="password" placeholder="Минимум 8 символов">

<label>Повторите пароль</label>
<input type="password" id="password2" placeholder="Повторите пароль">

<div id="error" class="error"></div>

<button type="submit">Зарегистрироваться</button>


</form>

<p class="login-link">
Уже есть аккаунт? <a href="login.html">Войти</a>
</p>

<div class="tg-login">
  

  <script async src="https://telegram.org/js/telegram-widget.js?22"
        data-telegram-login="ritmoriaauthBot"
        data-size="large"
        data-userpic="true"
        data-request-access="write"
        data-onauth="onTelegramAuth(user)">
</script>
</div>

</div>

</div>

<script src="/js/register.js"></script>
<script src="/js/navbar.js"></script>


<div id="codeModal" class="code-modal hidden">
  <div class="code-modal-content">

    <h3>Подтверди почту</h3>
    <p>Введите код, отправленный на email</p>

    <input id="codeInput" type="text" placeholder="123456" maxlength="6">

    <div class="code-actions">
      <button id="confirmCodeBtn">Подтвердить</button>
      <button onclick="closeCodeModal()" class="cancel">Отмена</button>
    </div>

    <div id="codeError" class="error"></div>

  </div>
</div>
</body>

</html>

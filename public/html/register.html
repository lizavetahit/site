<!DOCTYPE html>
<html lang="ru">
<head>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400&display=swap" rel="stylesheet"><link rel="stylesheet" href="/styles/base.css">
<link rel="stylesheet" href="/styles/navbar.css">   

<meta charset="UTF-8">
<title>Регистрация</title>
<link rel="stylesheet" href="../styles/register.css">

</head>

<script src="/js/navbar.js"></script>

<body>

<div id="navbar"></div>

<div class="auth-container">

<div class="auth-card">

<h1>Создать аккаунт</h1>

<p class="subtitle">Присоединяйся к музыкальной платформе</p>

<form id="registerForm">

<label>Имя пользователя</label>
<input type="text" id="username" placeholder="username">

<label>Email</label>
<input type="email" id="email" placeholder="example@mail.com">

<label>Пароль</label>
<input type="password" id="password" placeholder="Минимум 8 символов">

<label>Повторите пароль</label>
<input type="password" id="password2" placeholder="Повторите пароль">

<div id="error" class="error"></div>

<button type="submit">Зарегистрироваться</button>

</form>

<p class="login-link">
Уже есть аккаунт? <a href="login.html">Войти</a>
</p>

</div>

</div>

<script src="../js/register.js"></script>

</body>
</html>

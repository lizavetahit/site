<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Настройки</title>

<link rel="stylesheet" href="/styles/base.css">
<link rel="stylesheet" href="/styles/navbar.css">
<link rel="stylesheet" href="/styles/style.css">
<link rel="stylesheet" href="/styles/settings.css">
<link rel="stylesheet" href="/styles/privacy.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>
<div class="video-background">
  <video autoplay muted loop playsinline id="background-video">
    <source src="/images/bg.mp4" type="video/mp4">
  </video>
</div>

<div id="navbar"></div>

<div class="settings-container">

<h1 class="settings-title">Настройки</h1>

<div class="settings-grid">

  <div onclick="openSettings('archive')" class="settings-card">
    <i class="fa-solid fa-box-archive"></i>
    <span>Архив</span>
  </div>

  <div onclick="openSettings('privacy')" class="settings-card">
    <i class="fa-solid fa-shield-halved"></i>
    <span>Конфиденциальность</span>
  </div>

  <div onclick="openSettings('saved')" class="settings-card">
    <i class="fa-solid fa-bookmark"></i>
    <span>Сохранённые</span>
  </div>

  <div onclick="logout()" class="settings-card danger">
    <i class="fa-solid fa-right-from-bracket"></i>
    <span>Выйти из аккаунта</span>
  </div>

</div>

</div>

<script src="/js/navbar.js"></script>
<script src="/js/settings.js"></script>


<div id="settingsModal" class="settings-modal">

  <div class="settings-modal-content">

    <div class="settings-modal-header">
      <h2 id="modalTitle">Заголовок</h2>
      <button onclick="closeSettings()">&times;</button>
    </div>

    <div class="settings-modal-body" id="modalBody">
      Контент
    </div>

  </div>

</div>
</body>

</html>

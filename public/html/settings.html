<div class="settings-page">
  <div class="settings-page-container">
    <h1 class="settings-page-title">Настройки</h1>

    <div class="settings-page-grid">
      <div onclick="openSettings('archive')" class="settings-page-card">
        <i class="fa-solid fa-box-archive"></i>
        <span>Архив</span>
      </div>

      <div onclick="openSettings('privacy')" class="settings-page-card">
        <i class="fa-solid fa-shield-halved"></i>
        <span>Конфиденциальность</span>
      </div>

      <div onclick="openSettings('saved')" class="settings-page-card">
        <i class="fa-solid fa-bookmark"></i>
        <span>Сохранённые</span>
      </div>

      <div onclick="logout()" class="settings-page-card settings-page-card-danger">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Выйти из аккаунта</span>
      </div>
    </div>
  </div>
</div>

<div id="settingsModal" class="settings-page-modal">
  <div class="settings-page-modal-content">
    <div class="settings-page-modal-header">
      <h2 id="modalTitle">Заголовок</h2>
      <button type="button" class="settings-page-modal-close" onclick="closeSettings()">&times;</button>
    </div>

    <div class="settings-page-modal-body" id="modalBody">
      Контент
    </div>
  </div>
</div>

<div id="viewPostModal" class="settings-page-modal">
  <div class="settings-page-modal-content">
    <div class="settings-page-modal-header">
      <h2>Пост</h2>
      <button type="button" class="settings-page-modal-close" onclick="closeViewPost()">&times;</button>
    </div>

    <div id="viewPostBody" class="settings-page-view-post-body"></div>
  </div>
</div>

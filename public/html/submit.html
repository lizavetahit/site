<!DOCTYPE html>
<html lang="ru">
<head>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400&display=swap" rel="stylesheet"><link rel="stylesheet" href="/styles/base.css">

<link rel="stylesheet" href="/styles/base.css">
<link rel="stylesheet" href="/styles/navbar.css">
<link rel="stylesheet" href="/styles/style.css">
<link rel="stylesheet" href="/styles/submit.css">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Скинуть трек</title>

  
</head>

<script src="/js/navbar.js"></script>

<body>
<div class="video-background">
  <video autoplay muted loop playsinline id="background-video">
    <source src="/images/bg.mp4" type="video/mp4">
  </video>
</div> 

<div id="navbar"></div>

  <div class="page">
    <div class="card">
      <form id="trackForm">
        <div class="form-grid">
          <div class="cover-block">
            <label class="cover-label" for="coverInput">
              <div class="cover-placeholder" id="coverPlaceholder">
                <div class="hash">#</div>
                <div class="cover-text">cover</div>
              </div>
              <img id="coverPreview" class="cover-preview" alt="Обложка трека" />
            </label>

            <input
              id="coverInput"
              class="hidden-input"
              type="file"
              accept="image/*"
            />

            <div class="cover-hint">
              Нажми на обложку, чтобы загрузить изображение
            </div>
          </div>

          <div class="right-side">
            <div class="top-row">
              <div class="field-group">
                <label for="artistInput">Автор:</label>
                <input id="artistInput" name="artist" class="input" type="text" placeholder="Автор" />
              </div>

              <div class="field-group">
                <label for="titleInput">Название трека:</label>
                <input id="titleInput" name="title" class="input" type="text" placeholder="Название трека" />
              </div>
            </div>

            <div class="soundcloud-row">
              <div class="field-group">
                <label for="soundcloudInput">Ссылка SoundCloud:</label>
                <input id="soundcloudInput" name="soundcloud" class="input" type="text" />
              </div>

              <button type="button" class="fetch-btn" id="fetchBtn">
                ПОДТЯНУТЬ
              </button>
            </div>

            <div class="audio-upload-block">
              <div class="field-group">
                <label for="audioInput">Аудиофайл:</label>

                <label class="file-trigger" for="audioInput">
                  <div class="file-left">
                    <div class="file-btn">Выбрать файл</div>
                    <div class="file-name" id="audioFileName">Файл не выбран</div>
                  </div>
                </label>

                <input
                  id="audioInput"
                  class="hidden-input"
                  type="file"
                  accept="audio/*"
                />
              </div>

              <div class="audio-preview-wrap" id="audioPreviewWrap">
                <div class="audio-title">Предпрослушивание:</div>
                <audio id="audioPreview" controls></audio>
              </div>
            </div>

            <div class="status" id="statusText"></div>
          </div>
        </div>

        <button class="submit-btn" type="submit">
          ОТПРАВИТЬ ТРЕК
        </button>
      </form>

      <div class="queue-link-wrap">
        <a class="queue-link" href="/html/queue.html">посмотреть очередь</a>
      </div>
    </div>
  </div>

  
  <script src="/js/submit.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Отправить трек</title>
<link rel="stylesheet" href="../styles/style.css">
</head>

<body>

<div id="navbar"></div>

<script>

fetch("/html/components/navbar.html")
.then(res => res.text())
.then(data => {

document.getElementById("navbar").innerHTML = data

const script = document.createElement("script")
script.src = "/js/navbar.js"
document.body.appendChild(script)

})

</script>

<div class="layout">

<!-- ЛЕВАЯ КОЛОНКА -->

<aside class="sidebar">

<h2>🔥 Топ треки</h2>

<div class="card">
<img src="https://picsum.photos/300/200">
<h3>Artist — Track</h3>
<p>⭐ 92</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/201">
<h3>Artist — Track</h3>
<p>⭐ 88</p>
</div>

</aside>


<!-- ЦЕНТР (ПОСТЫ) -->

<main class="feed">

<h2>Лента</h2>

<div class="post">
<h4>Producer123</h4>
<p>Новый трек скоро выйдет 🔥</p>
</div>

<div class="post">
<h4>DJ Alex</h4>
<p>Кто кидает треки на стрим сегодня?</p>
</div>

<div class="post">
<h4>BeatMaker</h4>
<p>Сегодня сделал новый бит</p>
</div>

</main>


<!-- ПРАВАЯ КОЛОНКА -->

<aside class="sidebar">

<h2>🏆 Топ исполнители</h2>

<div class="artist-card">
<img src="https://picsum.photos/200">
<h3>ProducerX</h3>
</div>

<div class="artist-card">
<img src="https://picsum.photos/201">
<h3>DJ Alex</h3>
</div>

</aside>

</div>

</section>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Загрузить трек</title>

  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/navbar.css">
  <link rel="stylesheet" href="/styles/style.css">
  <link rel="stylesheet" href="/styles/upload.css">
</head>

<body>

<!-- 🎥 ФОН -->
<div class="video-background">
  <video autoplay muted loop playsinline id="background-video">
    <source src="/images/bg.mp4" type="video/mp4">
  </video>
</div>

<!-- NAVBAR -->
<div id="navbar"></div>
<script src="/js/navbar.js"></script>

<!-- PAGE -->
<div class="page">

  <div class="card">

    <form id="uploadForm">

      <div class="form-grid">

        <!-- 🎧 COVER -->
        <div class="cover-block">
          <label class="cover-label">
            <div class="cover-placeholder" id="coverPlaceholder">
              <div class="hash">#</div>
              <div>cover</div>
            </div>
            <img id="coverPreview" class="cover-preview">
            <input type="file" id="coverInput" hidden accept="image/*">
          </label>

          <div class="cover-hint">
            Нажми, чтобы загрузить обложку
          </div>

          <div class="cover-bottom">
  <div class="cover-ps">
    p.s. благодаря тэгам и жанрам,<br>
    ваши треки попадают в рекомендации
  </div>
</div>
        </div>

        <!-- 📄 RIGHT -->
        <div class="right-side">

  <div class="top-row">
    <div class="field">
      <label>Артист(ы)</label>
      <input id="artist" placeholder="ник артиста или артистов">
    </div>

    <div class="field">
      <label>Название трека</label>
      <input id="title" placeholder="Название трека">
    </div>
  </div>

  <div class="top-row">
    <div class="field">
      <label>Жанр</label>
      <input id="genre" placeholder="archivecore, hyperpop, trendy...">
    </div>

    <div class="field">
      <label>Продюсер</label>
      <input id="producer" placeholder="Producer name">
    </div>
  </div>

  <div class="field">
  <label>Тэги</label>
  <div class="tags-input" id="tagsContainer">
    <input id="tagsInput" placeholder="Add styles, moods, tempo...">
  </div>
</div>

  <div class="field">
    <label>Описание</label>
    <textarea id="description" placeholder="Напиши что-то о треке..."></textarea>
  </div>

  <div class="field">
    <label>Аудиофайл</label>

    <label class="file-input">
      <span class="file-btn">Выбрать файл</span>
      <span id="fileName">Файл не выбран</span>
      <input type="file" id="audio" hidden accept="audio/*">
    </label>
  </div>

  <div class="preview" id="preview">
    <audio controls id="audioPlayer"></audio>
  </div>

</div>
      </div>

      <button class="submit">Загрузить трек</button>

      <p id="status"></p>

    </form>

  </div>

</div>

<script src="/js/upload.js"></script>

</body>
</html>
